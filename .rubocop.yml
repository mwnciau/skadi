AllCops:
  DisabledByDefault: true
  SuggestExtensions: false
  TargetRubyVersion: 3.3
  UseCache: true

inherit_gem:
  standard: config/base.yml

# Enforce commas at the end of multiline arguments, hashes and arrays, improving git diffs
Style/TrailingCommaInArrayLiteral:
  EnforcedStyleForMultiline: diff_comma

Style/TrailingCommaInHashLiteral:
  EnforcedStyleForMultiline: diff_comma

Style/TrailingCommaInArguments:
  EnforcedStyleForMultiline: comma

# Enforce standardisation of method definitions
Style/MethodDefParentheses:
  Enabled: true
Naming/MethodName:
  Enabled: true

# Allow backwards compatible use of `it` parameter in blocks
# Todo: add AllowNamedParameter if standard ever gets updated
Style/ItAssignment:
  Enabled: false
